services:
  openchamber:
    image: ghcr.io/silverknightkma/openchamber:latest
    container_name: openchamber
    init: true
    ports:
      - "3000:3000"
      - "4095:4095"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OPENCHAMBER_HOST: 0.0.0.0
      OPENCODE_CONFIG_DIR: /home/openchamber/.config/opencode
      GIT_CONFIG_GLOBAL: /home/openchamber/.config/git/config
      UI_PASSWORD: change-me
      # Enable Docker-in-Docker for trusted deployments only. Requires privileged: true
      # plus the /var/lib/docker and /var/lib/containerd mounts below.
      # ENABLE_DIND: "true"
      # Enable only one optional oh-my-opencode package at a time.
      # OH_MY_OPENCODE: "true"
      # OH_MY_OPENCODE_SLIM: "true"
      # Optional: install/update managed mounted tools at startup. Default startup
      # does not fetch tools; run only for trusted networks and writable mounts.
      # OPENCHAMBER_MANAGED_TOOLS_AUTOINSTALL: "true"
      # Managed install roots are baked into the image env: .npm-global,
      # .local/go, .go, .cargo, .rustup, .local/pip, and .bun.
    restart: unless-stopped
    volumes:
      - ./data/config/openchamber:/home/openchamber/.config/openchamber
      - ./data/config/opencode:/home/openchamber/.config/opencode
      - ./data/share/opencode:/home/openchamber/.local/share/opencode
      - ./data/state/opencode:/home/openchamber/.local/state/opencode
      - ./data/ssh:/home/openchamber/.ssh
      - ./data/workspaces:/home/openchamber/workspaces
      - ./data/config/git:/home/openchamber/.config/git
      - ./data/config/gh:/home/openchamber/.config/gh
      # Managed tool mounts feed PATH from .local/bin, .npm-global/bin,
      # .local/go/bin, .go/bin, .cargo/bin, .local/pip/bin, and .bun/bin.
      - ./data/npm-global:/home/openchamber/.npm-global
      - ./data/bun:/home/openchamber/.bun
      - ./data/local-bin:/home/openchamber/.local/bin
      - ./data/local-go:/home/openchamber/.local/go
      - ./data/local-pip:/home/openchamber/.local/pip
      - ./data/cargo:/home/openchamber/.cargo
      - ./data/rustup:/home/openchamber/.rustup
      - ./data/go:/home/openchamber/.go
      - ./data/nvim/config:/home/openchamber/.config/nvim
      - ./data/nvim/share:/home/openchamber/.local/share/nvim
      - ./data/nvim/state:/home/openchamber/.local/state/nvim
      - ./data/cloudflared:/home/openchamber/.cloudflared
      # Docker-in-Docker state. Uncomment with ENABLE_DIND=true.
      # - ./data/docker:/var/lib/docker
      # - ./data/containerd:/var/lib/containerd
      # Optional daemon network config for avoiding bridge CIDR collisions.
      # - ./dockerd-daemon.example.json:/etc/docker/daemon.json:ro
    # Docker-in-Docker requires elevated privileges. Leave disabled unless needed.
    # privileged: true
    # security_opt:
    #   - no-new-privileges:false
