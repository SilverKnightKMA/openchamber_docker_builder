name: Build Upstream Main

permissions:
  contents: read
  packages: write

on:
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile.dockerfile
      - package.json
      - package-lock.json
      - go.mod
      - go.sum
      - tools.go
      - tools/release-tools.json
      - scripts/install-release-tools.sh
      - scripts/openchamber-dind-entrypoint.sh
      - scripts/update-release-tools.mjs
      - scripts/validate-release-tools.mjs
      - .github/workflows/build-upstream-main.yml
      - .github/workflows/build-upstream-release.yml
      - .github/workflows/update-release-tools.yml
  push:
    branches:
      - main
    paths:
      - Dockerfile.dockerfile
      - package.json
      - package-lock.json
      - go.mod
      - go.sum
      - tools.go
      - tools/release-tools.json
      - scripts/install-release-tools.sh
      - scripts/openchamber-dind-entrypoint.sh
      - scripts/update-release-tools.mjs
      - scripts/validate-release-tools.mjs
      - .github/workflows/build-upstream-main.yml
      - .github/workflows/build-upstream-release.yml
      - .github/workflows/update-release-tools.yml
  schedule:
    - cron: "7 */2 * * *"
  workflow_dispatch:

env:
  UPSTREAM_REPO: openchamber/openchamber
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/openchamber

jobs:
  build-main:
    name: Build upstream main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout builder repository
        uses: actions/checkout@v6
        with:
          path: builder
          fetch-depth: 1

      - name: Resolve builder scope fingerprint
        id: builder_scope
        working-directory: builder
        run: |
          files=(
            Dockerfile.dockerfile
            package.json
            package-lock.json
            go.mod
            go.sum
            tools.go
            tools/release-tools.json
            scripts/install-release-tools.sh
            scripts/openchamber-dind-entrypoint.sh
            scripts/update-release-tools.mjs
            scripts/validate-release-tools.mjs
            .github/workflows/build-upstream-main.yml
            .github/workflows/build-upstream-release.yml
            .github/workflows/update-release-tools.yml
          )

          for file in "${files[@]}"; do
            if [ ! -f "${file}" ]; then
              echo "Missing builder scope file: ${file}" >&2
              exit 1
            fi
          done

          builder_scope_sha="$({ for file in "${files[@]}"; do sha256sum "${file}"; done; } | sha256sum | cut -d' ' -f1)"
          builder_scope_short_sha="$(printf '%s' "${builder_scope_sha}" | cut -c1-12)"

          {
            echo "builder_scope_sha=${builder_scope_sha}"
            echo "builder_scope_short_sha=${builder_scope_short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout upstream main
        uses: actions/checkout@v6
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: main
          path: upstream
          fetch-depth: 1

      - name: Resolve upstream revision
        id: upstream
        working-directory: upstream
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set image tags
        id: tags
        run: |
          IMAGE="${REGISTRY}/$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          VERSION_TAG="main-u${{ steps.upstream.outputs.short_sha }}-b${{ steps.builder_scope.outputs.builder_scope_short_sha }}"
          {
            echo "version_tag=${VERSION_TAG}"
            echo "tags=${IMAGE}:latest,${IMAGE}:${VERSION_TAG}"
            echo "check_tag=${IMAGE}:${VERSION_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether upstream main image already exists
        if: github.event_name != 'pull_request'
        id: existing
        run: |
          if docker manifest inspect "${{ steps.tags.outputs.check_tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image tag already exists: ${{ steps.tags.outputs.check_tag }}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: github.event_name == 'pull_request' || steps.existing.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build upstream main image
        if: github.event_name == 'pull_request' || steps.existing.outputs.exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: upstream
          file: builder/Dockerfile.dockerfile
          build-contexts: |
            toolchain=builder
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ env.UPSTREAM_REPO }}
            org.opencontainers.image.revision=${{ steps.upstream.outputs.sha }}
            org.opencontainers.image.version=${{ steps.tags.outputs.version_tag }}
            org.opencontainers.image.description=Built from upstream ${{ env.UPSTREAM_REPO }} main
            io.openchamber.builder-scope-sha=${{ steps.builder_scope.outputs.builder_scope_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "## Build validated" >> "$GITHUB_STEP_SUMMARY"
            echo "PR validation built upstream main image without pushing." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.existing.outputs.exists }}" = "true" ]; then
            echo "## Build skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "${{ steps.tags.outputs.check_tag }} already exists." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Build complete" >> "$GITHUB_STEP_SUMMARY"
            echo "Pushed: ${{ steps.tags.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "Builder scope: \`${{ steps.builder_scope.outputs.builder_scope_short_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
