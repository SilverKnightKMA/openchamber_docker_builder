name: Build Upstream Main

permissions:
  contents: read
  packages: write

on:
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile.dockerfile
      - package.json
      - package-lock.json
      - go.mod
      - go.sum
      - tools.go
      - tools/release-tools.json
      - scripts/install-release-tools.sh
      - scripts/openchamber-dind-entrypoint.sh
      - scripts/update-release-tools.mjs
      - scripts/validate-release-tools.mjs
      - scripts/managed-npm-tools.mjs
      - scripts/managed-go-tools.mjs
      - scripts/managed-mounted-tools.mjs
      - scripts/managed-tools-output.mjs
      - scripts/managed-tools-status.mjs
      - managed-tools/**
      - .github/workflows/build-upstream-main.yml
      - .github/workflows/build-upstream-release.yml
      - .github/workflows/update-release-tools.yml
  push:
    branches:
      - main
    paths:
      - Dockerfile.dockerfile
      - package.json
      - package-lock.json
      - go.mod
      - go.sum
      - tools.go
      - tools/release-tools.json
      - scripts/install-release-tools.sh
      - scripts/openchamber-dind-entrypoint.sh
      - scripts/update-release-tools.mjs
      - scripts/validate-release-tools.mjs
      - scripts/managed-npm-tools.mjs
      - scripts/managed-go-tools.mjs
      - scripts/managed-mounted-tools.mjs
      - scripts/managed-tools-output.mjs
      - scripts/managed-tools-status.mjs
      - managed-tools/**
      - .github/workflows/build-upstream-main.yml
      - .github/workflows/build-upstream-release.yml
      - .github/workflows/update-release-tools.yml
  schedule:
    - cron: "7 */2 * * *"
  workflow_dispatch:

env:
  UPSTREAM_REPO: openchamber/openchamber
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/openchamber

jobs:
  build-main:
    name: Build upstream main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout builder repository
        uses: actions/checkout@v6
        with:
          path: builder
          fetch-depth: 1

      - name: Resolve builder scope fingerprint
        id: builder_scope
        working-directory: builder
        run: |
          files=(
            Dockerfile.dockerfile
            package.json
            package-lock.json
            go.mod
            go.sum
            tools.go
            tools/release-tools.json
            scripts/install-release-tools.sh
            scripts/openchamber-dind-entrypoint.sh
            scripts/update-release-tools.mjs
            scripts/validate-release-tools.mjs
            scripts/managed-npm-tools.mjs
            scripts/managed-go-tools.mjs
            scripts/managed-mounted-tools.mjs
            scripts/managed-tools-output.mjs
            scripts/managed-tools-status.mjs
            managed-tools/manifest.json
            managed-tools/policy.json
            .github/workflows/build-upstream-main.yml
            .github/workflows/build-upstream-release.yml
            .github/workflows/update-release-tools.yml
          )

          for file in "${files[@]}"; do
            if [ ! -f "${file}" ]; then
              echo "Missing builder scope file: ${file}" >&2
              exit 1
            fi
          done

          builder_scope_sha="$({ for file in "${files[@]}"; do sha256sum "${file}"; done; } | sha256sum | cut -d' ' -f1)"
          builder_scope_short_sha="$(printf '%s' "${builder_scope_sha}" | cut -c1-12)"

          {
            echo "builder_scope_sha=${builder_scope_sha}"
            echo "builder_scope_short_sha=${builder_scope_short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout upstream main
        uses: actions/checkout@v6
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: main
          path: upstream
          fetch-depth: 1

      - name: Resolve upstream revision
        id: upstream
        working-directory: upstream
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set image tags
        id: tags
        run: |
          IMAGE="${REGISTRY}/$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          VERSION_TAG="main-u${{ steps.upstream.outputs.short_sha }}-b${{ steps.builder_scope.outputs.builder_scope_short_sha }}"
          {
            echo "version_tag=${VERSION_TAG}"
            echo "latest_tag=${IMAGE}:latest"
            echo "tags=${IMAGE}:latest,${IMAGE}:${VERSION_TAG}"
            echo "check_tag=${IMAGE}:${VERSION_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether upstream main image already exists
        if: github.event_name != 'pull_request'
        id: existing
        run: |
          if docker manifest inspect "${{ steps.tags.outputs.check_tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image tag already exists: ${{ steps.tags.outputs.check_tag }}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image tag does not exist: ${{ steps.tags.outputs.check_tag }}"
          fi

      - name: Build and push image
        if: github.event_name == 'pull_request' || steps.existing.outputs.exists == 'false'
        run: |
          cd upstream
          docker build \
            -f ../builder/Dockerfile.dockerfile \
            --build-context toolchain=../builder \
            --build-arg VERSION="${{ steps.upstream.outputs.sha }}" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "${{ steps.tags.outputs.check_tag }}" \
            -t "${{ steps.tags.outputs.latest_tag }}" \
            .
          echo "Built and tagged: ${{ steps.tags.outputs.tags }}"
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            docker push --all-tags "${{ env.REGISTRY }}/$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')"
            echo "Pushed all tags"
          fi