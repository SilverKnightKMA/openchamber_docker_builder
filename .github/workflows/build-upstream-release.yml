name: Build Upstream Release

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - package.json
      - package-lock.json
      - go.mod
      - go.sum
      - tools.go
      - tools/release-tools.json
      - scripts/install-release-tools.sh
      - .github/workflows/build-upstream-main.yml
      - .github/workflows/build-upstream-release.yml
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Upstream release tag or ref to build (defaults to latest upstream release)"
        required: false
        type: string
        default: ""

env:
  UPSTREAM_REPO: openchamber/openchamber
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/openchamber

jobs:
  build-release:
    name: Build latest upstream release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout builder repository
        uses: actions/checkout@v6
        with:
          path: builder
          fetch-depth: 1

      - name: Resolve builder scope fingerprint
        id: builder_scope
        working-directory: builder
        run: |
          files=(
            Dockerfile
            package.json
            package-lock.json
            go.mod
            go.sum
            tools.go
            tools/release-tools.json
            scripts/install-release-tools.sh
            .github/workflows/build-upstream-main.yml
            .github/workflows/build-upstream-release.yml
          )

          for file in "${files[@]}"; do
            if [ ! -f "${file}" ]; then
              echo "Missing builder scope file: ${file}" >&2
              exit 1
            fi
          done

          builder_scope_sha="$({ for file in "${files[@]}"; do sha256sum "${file}"; done; } | sha256sum | cut -d' ' -f1)"
          builder_scope_short_sha="$(printf '%s' "${builder_scope_sha}" | cut -c1-12)"

          {
            echo "builder_scope_sha=${builder_scope_sha}"
            echo "builder_scope_short_sha=${builder_scope_short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve release ref
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_UPSTREAM_REF: ${{ inputs.upstream_ref }}
        run: |
          if [ -n "${INPUT_UPSTREAM_REF}" ]; then
            TAG="${INPUT_UPSTREAM_REF}"
          else
            TAG="$(gh api "repos/${UPSTREAM_REPO}/releases/latest" --jq .tag_name)"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout upstream release
        uses: actions/checkout@v6
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ steps.release.outputs.tag }}
          path: upstream
          fetch-depth: 1

      - name: Resolve upstream revision
        id: upstream
        working-directory: upstream
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set image tags
        id: tags
        run: |
          IMAGE="${REGISTRY}/$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          VERSION_TAG="${{ steps.release.outputs.tag }}-b${{ steps.builder_scope.outputs.builder_scope_short_sha }}"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "tags=${IMAGE}:${{ steps.release.outputs.tag }},${IMAGE}:stable,${IMAGE}:${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "check_tag=${IMAGE}:${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether upstream release image already exists
        id: existing
        run: |
          if docker manifest inspect "${{ steps.tags.outputs.check_tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image tag already exists: ${{ steps.tags.outputs.check_tag }}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.existing.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build and push upstream release image
        if: steps.existing.outputs.exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: upstream
          file: builder/Dockerfile
          build-contexts: |
            toolchain=builder
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ env.UPSTREAM_REPO }}
            org.opencontainers.image.revision=${{ steps.upstream.outputs.sha }}
            org.opencontainers.image.version=${{ steps.release.outputs.tag }}
            org.opencontainers.image.description=Built from upstream ${{ env.UPSTREAM_REPO }} release ${{ steps.release.outputs.tag }}
            io.openchamber.builder-scope-sha=${{ steps.builder_scope.outputs.builder_scope_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          if [ "${{ steps.existing.outputs.exists }}" = "true" ]; then
            echo "## Build skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "${{ steps.tags.outputs.check_tag }} already exists." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Build complete" >> "$GITHUB_STEP_SUMMARY"
            echo "Pushed: ${{ steps.tags.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "Builder scope: \`${{ steps.builder_scope.outputs.builder_scope_short_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
